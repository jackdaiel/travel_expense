<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8590c">
<link rel="apple-touch-icon" href="travel_expense.png">
<link rel="icon" type="image/png" href="travel_expense.png">
<title>✈ Travel Expense</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --org:#e8590c;--org2:#ff7c38;--org4:#fff3ec;--org5:#ffdcc8;
  --dark:#1c0e04;--ink:#2d1a08;--muted:#8c6a50;
  --border:#f0d4c0;--paper:#fffaf7;--white:#fff;
  --red:#d63030;--green:#2e7d5e;--blue:#1a6fa8;
  --font-en:'Outfit',sans-serif;--font-jp:'Noto Sans JP',sans-serif;--font-title:'Bebas Neue','Outfit',sans-serif;
  --r:14px;--sh:0 2px 16px rgba(232,89,12,.1);--sh2:0 6px 32px rgba(232,89,12,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-jp);font-size:16px;overflow:hidden}
.hdr{background:#e8590c;color:#fff;padding:calc(.7rem + env(safe-area-inset-top)) 1rem .7rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 24px rgba(180,60,0,.4);position:relative;overflow:hidden;cursor:pointer;}
.hdr-deco{position:absolute;right:-4px;top:50%;transform:translateY(-50%);opacity:.12;pointer-events:none;line-height:1;}
.hdr-deco svg{width:72px;height:72px;fill:#fff;}
.hdr-l{display:flex;flex-direction:column;gap:.05rem;z-index:1;}
.hdr-title{font-family:var(--font-title);font-size:1.85rem;font-weight:400;letter-spacing:.08em;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.2);}
.hdr-sub{font-family:var(--font-en);font-size:.65rem;font-weight:500;letter-spacing:.22em;color:rgba(255,255,255,.7);text-transform:uppercase;}
.hdr-r{display:flex;align-items:center;gap:.45rem;z-index:1;}
/* 旅行選択バー（ヘッダー直下） */
.trip-bar{background:linear-gradient(90deg,#1c0e04 0%,#2d1808 100%);padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.trip-bar-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
.trip-bar-sel{flex:1;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,120,40,.5);color:#fff;border-radius:8px;padding:.42rem .75rem;font-size:.9rem;font-family:var(--font-jp);cursor:pointer;font-weight:500;-webkit-appearance:none;appearance:none;text-overflow:ellipsis;transition:border-color .2s,box-shadow .2s;}
.trip-bar-sel.unset{border-color:rgba(255,180,80,.9);animation:pulse-border 1.8s ease-in-out infinite;}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(255,140,40,.4);}50%{box-shadow:0 0 0 4px rgba(255,140,40,.15);}}
.trip-bar-sel:focus{outline:none;border-color:var(--org);box-shadow:0 0 0 3px rgba(232,89,12,.25);}
.trip-bar-sel option{color:var(--ink);background:#fff;}
.trip-bar-arrow{color:rgba(255,120,40,.7);font-size:.8rem;pointer-events:none;flex-shrink:0;}
.icon-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;flex-shrink:0}
.nav{display:flex;background:#fff;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;box-shadow:0 -3px 16px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom);padding-bottom:max(env(safe-area-inset-bottom),8px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:.45rem .2rem .35rem;cursor:pointer;transition:color .18s;color:var(--muted);font-size:.72rem;gap:.18rem;border:none;background:none}
.nb .ni{font-size:1.25rem;transition:transform .18s}
.nb.on{color:var(--org)}
.nb.on .ni{transform:scale(1.12)}
.pages{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.page{display:none;padding:.9rem}
.page.on{display:block}
.stitle{font-family:var(--font-en);font-size:1.1rem;font-weight:700;color:var(--org);margin-bottom:.75rem;display:flex;align-items:center;gap:.35rem}
.card{background:#fff;border-radius:var(--r);padding:1.1rem;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:.8rem}
.fl{font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.28rem;display:block}
.fi,.fs{width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:var(--font-jp);background:#fff;color:#000;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--org);box-shadow:0 0 0 3px rgba(232,89,12,.09)}
.fi[type=number]{font-family:var(--font-en);font-size:1.15rem;font-weight:700;color:#000}
.fr{margin-bottom:.85rem}
.pills{display:flex;gap:.4rem;flex-wrap:wrap}
.pill{padding:.5rem .85rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.86rem;font-family:var(--font-jp);transition:all .16s;color:var(--muted);text-align:center}
.pill.on{border-color:var(--org);background:var(--org4);color:var(--org);font-weight:600}
.pill.blue.on{border-color:var(--blue);background:#e8f2fb;color:var(--blue)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.38rem}
.cb{padding:.55rem .2rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;text-align:center;font-size:.78rem;font-family:var(--font-jp);transition:all .16s;color:var(--muted);display:flex;flex-direction:column;gap:.12rem;align-items:center}
.cb .ci{font-size:1.2rem}
.cb.on{border-color:var(--org);background:var(--org4);color:var(--org);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.35rem}
.chip{padding:.26rem .7rem;border:1px solid var(--border);border-radius:16px;font-size:.8rem;background:#fff;cursor:pointer;color:var(--muted);transition:all .14s;font-family:var(--font-jp)}
.chip:hover,.chip.on{border-color:var(--org);color:var(--org);background:var(--org4)}
.chip-e{padding:.26rem .65rem;border:1px dashed var(--border);border-radius:16px;font-size:.76rem;background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-jp)}
.sbtn{width:100%;padding:.85rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--org),var(--org2));color:#fff;font-size:1rem;font-weight:700;font-family:var(--font-jp);cursor:pointer;transition:all .2s;letter-spacing:.04em;box-shadow:0 4px 14px rgba(232,89,12,.3)}
.sbtn:active{transform:scale(.97)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.9rem}
.sc{background:#fff;border-radius:var(--r);padding:.8rem .9rem;border:1px solid var(--border);box-shadow:var(--sh)}
.sc.full{grid-column:1/-1}
.sl{font-size:.76rem;color:var(--muted);margin-bottom:.18rem;font-weight:500}
.sv{font-family:var(--font-en);font-size:1.25rem;font-weight:800;color:#000}
.sv.neg{color:var(--red)}
.sv.blue{color:#000}.sv.green{color:#000}
.ss{font-size:.72rem;color:var(--muted);margin-top:.12rem}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:.9rem}
table{width:100%;border-collapse:collapse;font-size:.83rem;min-width:280px}
th{background:var(--org);color:#fff;padding:.5rem .55rem;text-align:center;font-weight:600;white-space:nowrap}
td{padding:.45rem .55rem;border-bottom:1px solid var(--border);text-align:center;color:#000}
tr:nth-child(even) td{background:var(--org4)}
.tl{text-align:left}.tr{text-align:right;font-family:var(--font-en);font-weight:600;color:#000}
.tr.neg{color:var(--red)}
.tot-row td{background:#ffe8d8!important;font-weight:700;color:#000}
.alloc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.5rem}
.alloc-item{display:flex;flex-direction:column;gap:.2rem}
.alloc-lbl{font-size:.76rem;font-weight:700;color:var(--muted);text-align:center}
.alloc-input{width:100%;padding:.5rem .4rem;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:var(--font-en);font-weight:600;text-align:right;color:#000;background:#fff;transition:border-color .2s}
.alloc-input:focus{outline:none;border-color:var(--org);box-shadow:0 0 0 3px rgba(232,89,12,.09)}
.alloc-total{font-family:var(--font-en);font-size:.82rem;font-weight:700;text-align:center;margin-top:.3rem;padding:.3rem;border-radius:8px;background:var(--org4);color:#000}
.tc{background:#fff;border-radius:var(--r);padding:.9rem 1rem;margin-bottom:.6rem;border:1px solid var(--border);box-shadow:var(--sh);cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--org),var(--org2))}
.tc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.tc.active{border-color:var(--org);background:var(--org4)}
.tc-name{font-weight:700;font-size:.95rem;margin-bottom:.2rem;color:#000}
.tc-date{font-size:.78rem;color:var(--muted)}
.tc-tot{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);font-family:var(--font-en);font-weight:800;font-size:1.05rem;color:#000}
.ei-row{display:flex;align-items:center;gap:.5rem;padding:.65rem .1rem;border-bottom:1px solid var(--border)}
.edate{font-size:.74rem;color:var(--muted);min-width:34px;font-family:var(--font-en)}
.ebadge{font-size:.68rem;padding:.15rem .48rem;border-radius:12px;background:var(--org4);color:var(--org);font-weight:600;white-space:nowrap}
.einfo{flex:1;min-width:0}
.emain{font-size:.86rem;font-weight:500;color:#000}
.esub{font-size:.74rem;color:var(--muted)}
.eamt{font-family:var(--font-en);font-weight:700;font-size:.92rem;min-width:60px;text-align:right;color:#000}
.eamt.neg{color:var(--red)}
.edel{color:var(--border);font-size:.78rem;cursor:pointer;padding:.15rem;background:none;border:none}
.edel:hover{color:var(--red)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.mo.hidden{display:none}
.md{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:1.2rem;max-height:82vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
.mhdr h3{font-size:1rem;font-weight:700}
.mclose{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.mclist{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem;min-height:1.8rem}
.mc{display:flex;align-items:center;gap:.25rem;padding:.25rem .6rem;border:1px solid var(--border);border-radius:10px;font-size:.82rem;background:var(--paper);font-family:var(--font-jp)}
.mcd{background:none;border:none;color:var(--border);cursor:pointer;font-size:.85rem}
.mcd:hover{color:var(--red)}
.marow{display:flex;gap:.4rem}
.marow input{flex:1;padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:var(--font-jp)}
.marow button{padding:.5rem .9rem;background:var(--org);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.add-btn{background:var(--org);color:#fff;border:none;border-radius:18px;padding:.3rem .9rem;font-size:.82rem;cursor:pointer;font-weight:600;font-family:var(--font-jp)}
.fps{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.fp{padding:.3rem .8rem;border:1px solid var(--border);border-radius:16px;font-size:.78rem;cursor:pointer;background:#fff;color:var(--muted);transition:all .14s;font-family:var(--font-jp)}
.fp.on{background:var(--org);border-color:var(--org);color:#fff;font-weight:600}
.sub-hdr{font-size:.82rem;font-weight:700;color:var(--muted);margin:.85rem 0 .35rem;padding-bottom:.25rem;border-bottom:1px solid var(--border)}
.toast{position:fixed;bottom:4.2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:.75rem 1.4rem;border-radius:22px;font-size:.9rem;opacity:0;transition:all .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:2000;border-left:4px solid var(--org);font-weight:500;white-space:nowrap;box-shadow:0 5px 20px rgba(0,0,0,.32)}
.toast.success{background:#1a3d2b;border-left-color:#4caf82}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1.03)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.ei2{font-size:2.5rem;margin-bottom:.5rem}
.chip-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:0 0 0 .2rem;line-height:1;vertical-align:middle}
.chip-del:hover{color:var(--red)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--org5);border-radius:3px}

  /* ── ツールバー ── */
  .tv-toolbar{padding:1rem 1rem 2rem;border-top:1px solid rgba(255,255,255,.12);margin-top:.8rem;display:flex;flex-direction:column;gap:.55rem;}
  .tv-btn-row{display:flex;gap:.45rem;}
  .tv-btn{display:flex;align-items:center;justify-content:center;gap:.45rem;padding:.7rem .9rem;border-radius:10px;font-family:inherit;font-size:.87rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:all .15s;width:100%;}
  .tv-btn-ss{background:linear-gradient(135deg,#e8590c,#c44008);color:#fff;box-shadow:0 2px 12px rgba(232,89,12,.4);}
  .tv-btn-csv{background:linear-gradient(135deg,#2e7d4e,#1a5c36);color:#fff;box-shadow:0 2px 10px rgba(46,125,78,.35);}
  .tv-btn-exp{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);flex:1;font-size:.82rem;padding:.6rem .5rem;}
  .tv-btn-imp{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1.5px dashed rgba(255,255,255,.28);flex:1;font-size:.82rem;padding:.6rem .5rem;text-align:center;display:flex;align-items:center;justify-content:center;gap:.35rem;}
  .tv-note{font-size:.71rem;color:rgba(255,255,255,.45);text-align:center;margin-top:-.1rem;}
</style>
</head>
<body>

<div class="hdr" onclick="goPage('entry',document.getElementById('nb-entry'))">
  <div class="hdr-l">
    <div class="hdr-title">TRAVEL EXPENSE</div>
    <div class="hdr-sub">Trip Budget Tracker</div>
  </div>
  <div class="hdr-r" onclick="event.stopPropagation()">
    <button class="icon-btn" onclick="loadAllFromGAS()">🔄</button>
  </div>
  <!-- 飛行機SVGデコレーション -->
  <div class="hdr-deco">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 50 L55 15 L65 20 L45 50 L65 80 L55 85 Z M45 50 L90 38 L90 62 Z M20 62 L35 56 L35 70 Z"/>
    </svg>
  </div>
</div>
<!-- 旅行選択バー -->
<div class="trip-bar">
  <select class="trip-bar-sel" id="hdr-trip-sel" onchange="onTripChange(this.value)">
    <option value="">旅行を選択してください</option>
  </select>
</div>

<div class="pages">

  <!-- 記録 -->
  <div class="page on" id="page-entry">
    <div class="card">
      <div class="stitle">💴 支出を記録</div>
      <div class="fr"><label class="fl">日付</label><input type="date" class="fi" id="e-date"></div>
      <div class="fr"><label class="fl">カテゴリ</label><div class="cat-grid" id="cat-grid"></div></div>
      <div class="fr" id="subcat-row" style="display:none">
        <label class="fl">詳細 <span style="font-weight:300;text-transform:none">（任意）</span></label>
        <div class="chips" id="subcat-chips"></div>
        <input type="text" class="fi" id="e-subcat" placeholder="詳細を入力または選択" style="margin-top:.38rem">
      </div>
      <div class="fr">
        <label class="fl">支払者</label>
        <div class="pills" id="payer-pills">
          <button class="pill" onclick="setPayer('大',this)">大</button>
          <button class="pill" onclick="setPayer('洋子',this)">洋子</button>
          <button class="pill" onclick="setPayer('公費',this)">公費</button>
        </div>
      </div>
      <div class="fr">
        <label class="fl">決済方法</label>
        <div class="pills" id="pay-pills">
          <button class="pill blue" onclick="setPayMethod('カード',this)">💳 カード</button>
          <button class="pill blue" onclick="setPayMethod('QR',this)">📱 QR</button>
          <button class="pill blue" onclick="setPayMethod('現金',this)">💴 現金</button>
        </div>
        <div class="chips" id="pay-chips"></div>
        <input type="text" class="fi" id="e-paydetail" placeholder="例: 楽天カード、楽天Pay" style="margin-top:.38rem;display:none">
      </div>
      <div class="fr"><label class="fl">金額</label><input type="number" class="fi" id="e-amount" placeholder="0" inputmode="numeric"></div>
      <div class="fr"><label class="fl">メモ <span style="font-weight:300;text-transform:none">（任意）</span></label><input type="text" class="fi" id="e-memo" placeholder="メモ"></div>
      <button class="sbtn" onclick="submitEntry()">✈ 記録する</button>
    </div>
  </div>

  <!-- 集計 -->
  <div class="page" id="page-summary">
    <div class="stitle">📊 集計</div>
    <div id="sum-no-trip"><div class="empty"><div class="ei2">🗺</div><p>旅行を選択してください</p></div></div>
    <div id="sum-content" style="display:none">
      <div class="sg" id="sum-cards"></div>
      <div class="sub-hdr">👤 人別集計</div>
      <div class="tw"><table><thead><tr><th>カテゴリ</th><th>大</th><th>洋子</th><th>公費</th><th>合計</th></tr></thead><tbody id="payer-body"></tbody></table></div>
      <div class="sub-hdr">🗂 カテゴリ別</div>
      <div class="tw"><table><thead><tr><th>カテゴリ</th><th>金額</th><th>件数</th><th>割合</th></tr></thead><tbody id="cat-body"></tbody></table></div>
      <div class="sub-hdr">✏️ 最終按分金額</div>
      <div class="card" style="padding:.9rem">
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem">実際の負担額を入力してください</div>
        <div class="alloc-grid">
          <div class="alloc-item"><div class="alloc-lbl">大</div><input type="number" class="alloc-input" id="alloc-dai" placeholder="0" inputmode="numeric" oninput="updateAllocTotal()"></div>
          <div class="alloc-item"><div class="alloc-lbl">洋子</div><input type="number" class="alloc-input" id="alloc-yoko" placeholder="0" inputmode="numeric" oninput="updateAllocTotal()"></div>
          <div class="alloc-item"><div class="alloc-lbl">公費</div><input type="number" class="alloc-input" id="alloc-kohi" placeholder="0" inputmode="numeric" oninput="updateAllocTotal()"></div>
        </div>
        <div class="alloc-total" id="alloc-total">合計: ¥0</div>
        <button class="sbtn" style="margin-top:.6rem;padding:.65rem;font-size:.85rem" onclick="saveAlloc()">按分を保存</button>
      </div>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="page" id="page-history">
    <div class="stitle">📋 記録一覧</div>
    <div id="hist-list"></div>
  </div>

  <!-- 旅行管理 -->
  <div class="page" id="page-trips">
    <div class="shdr">
      <div class="stitle" style="margin:0">🗺 旅行管理</div>
      <button class="add-btn" onclick="openTripModal()">＋ 追加</button>
    </div>
    <div id="trip-list"></div>

    <div class="tv-toolbar">
      <!-- SSを開く -->
      <a class="tv-btn tv-btn-ss" href="https://docs.google.com/spreadsheets/d/1g3ZCbcFSylflDdMTGC99D7jN-WuyHO-IazsKQTFtyLc/edit" target="_blank" rel="noopener">
        <span>🗂️</span><span>スプレッドシートを開く</span>
      </a>
      <!-- SS出力（CSV） -->
      <button class="tv-btn tv-btn-csv" onclick="exportSSData()">
        <span>📊</span><span>スプレッドシート出力（CSV）</span>
      </button>
      <!-- 候補同期 -->
      <div class="tv-btn-row">
        <button class="tv-btn tv-btn-exp" onclick="exportTravelPrefs()">📤 候補エクスポート</button>
        <label class="tv-btn tv-btn-imp">
          📥 候補インポート
          <input type="file" accept=".json" style="display:none" onchange="importTravelPrefs(this)">
        </label>
      </div>
      <p class="tv-note">MacとiPhoneの候補（サブカテゴリ・決済）を同期できます</p>
    </div>
  </div>

</div>

  <button class="nb on" id="nb-entry" onclick="goPage('entry',this)"><span class="ni">💴</span>記録</button>
  <button class="nb" onclick="goPage('summary',this)"><span class="ni">📊</span>集計</button>
  <button class="nb" onclick="goPage('history',this)"><span class="ni">📋</span>履歴</button>

<div class="toast" id="toast"></div>

<!-- TRIP MODAL -->
<div class="mo hidden" id="trip-mo" onclick="closeTripMo(event)">
  <div class="md">
    <div class="mhdr"><h3 id="trip-mo-title">旅行を追加</h3><button class="mclose" onclick="closeTripMo()">✕</button></div>
    <div class="fr"><label class="fl">旅行名</label><input type="text" class="fi" id="tm-name" placeholder="例: 九州旅行2026"></div>
    <div class="fr"><label class="fl">出発日</label><input type="date" class="fi" id="tm-start"></div>
    <div class="fr"><label class="fl">帰着日</label><input type="date" class="fi" id="tm-end"></div>
    <div class="fr"><label class="fl">メモ</label><input type="text" class="fi" id="tm-memo" placeholder="行き先など"></div>
    <input type="hidden" id="tm-edit-id">
    <button class="sbtn" onclick="saveTrip()">旅行を保存</button>
  </div>
</div>

<script>
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbxBkwYOaph7HrYw-3dPUPVkLGlp1w6BknsYTS5aJJtu0DeuuAxJ1sZwYf0lxbmokiRUhQ/exec';
const ACCESS_KEY = 'travel2026secure';

const CATS = [
  {key:'transport', icon:'🚗', label:'交通費',     subs:['飛行機','新幹線','電車','バス','タクシー','レンタカー','ガソリン','高速代']},
  {key:'hotel',     icon:'🏨', label:'宿泊費',     subs:['ホテル','旅館','民宿','Airbnb']},
  {key:'food',      icon:'🍜', label:'食費',       subs:['レストラン','スーパー','カフェ','居酒屋','コンビニ','飲み物']},
  {key:'sight',     icon:'⛩',  label:'観光・入場料', subs:['寺社仏閣','テーマパーク','博物館','展望台','アクティビティ','体験料金']},
  {key:'souvenir',  icon:'🎁', label:'お土産',     subs:['お土産','現地ショッピング']},
  {key:'comm',      icon:'📶', label:'通信費',     subs:['Wi-Fiレンタル','SIMカード']},
  {key:'insurance', icon:'🛡', label:'保険',       subs:['旅行保険']},
  {key:'misc',      icon:'🗂', label:'雑費',       subs:[]},
  {key:'other',     icon:'💡', label:'その他',     subs:[]},
];
const PAY_CHIPS = {
  'カード':['楽天カード','住信SBIカード','三井住友カード','JCBカード'],
  'QR':    ['楽天Pay','PayPay','iD','Suica','WAON','nanaco'],
};

let _entries=[],_trips=[],_allocs={},_curTrip='';
let _selCat='',_selPayer='',_selPay='',_chipKey='',_histFil='all';

async function gasFetch(params={}) {
  const qs=new URLSearchParams({...params,key:ACCESS_KEY}).toString();
  const r=await fetch(`${GAS_URL}?${qs}`);
  return r.json();
}
async function gasPost(body) {
  const payload = encodeURIComponent(JSON.stringify(body));
  const url = `${GAS_URL}?key=${ACCESS_KEY}&payload=${payload}`;
  const res = await fetch(url);
  const json = await res.json();
  if(json.status !== 'ok') console.error('gasPost error:', json);
  return json;
}

async function loadAllFromGAS(silent=false) {
  if(!silent)showToast('読み込み中…');
  try{
    const [dR,tR,aR]=await Promise.all([
      gasFetch({sheet:'data'}).catch(()=>({rows:[]})),
      gasFetch({sheet:'trips'}).catch(()=>({rows:[]})),
      gasFetch({sheet:'allocs'}).catch(()=>({rows:[]})),
    ]);
    _entries=[];
    (dR.rows||[]).slice(1).forEach(r=>{
      if(r[0]==='ID')return;
      const dv=r[2]; if(!dv)return;
      const ds=dv instanceof Date?dv.toISOString().slice(0,10):String(dv).slice(0,10);
      if(!ds||ds.length<8)return;
      const eid=r[0]?String(r[0]):`ss_${ds}_${r[8]}_${r[3]}`;
      _entries.push({id:eid,trip:String(r[1]||''),date:ds,cat:String(r[3]||''),subcat:String(r[4]||''),payer:String(r[5]||''),payMethod:String(r[6]||''),payDetail:String(r[7]||''),amount:parseFloat(r[8])||0,memo:String(r[9]||'')});
    });
    _trips=[];
    (tR.rows||[]).slice(1).forEach(r=>{if(!r[0])return;_trips.push({id:String(r[0]),name:String(r[1]||''),start:String(r[2]||''),end:String(r[3]||''),memo:String(r[4]||'')});});
    _allocs={};
    (aR.rows||[]).slice(1).forEach(r=>{if(!r[0])return;_allocs[String(r[0])]={大:parseFloat(r[1])||0,洋子:parseFloat(r[2])||0,公費:parseFloat(r[3])||0};});
    renderAll();
    if(!silent)showToast('読み込み完了','success');
  }catch(e){showToast('読み込みエラー');}
}

function renderAll(){renderTripSels();renderTripList();renderSummary();renderHistory();}

function renderTripSels(){
  const opts=_trips.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
  // 未選択時はパルスアニメーション
  const selEl=document.getElementById('hdr-trip-sel');
  if(selEl){if(!_curTrip)selEl.classList.add('unset');else selEl.classList.remove('unset');}
  const el=document.getElementById('hdr-trip-sel');
  el.innerHTML='<option value="">旅行を選択</option>'+opts;
  if(_curTrip) el.value=_curTrip;
}
function onTripChange(val){
  _curTrip=val;
  renderSummary();renderHistory();renderTripList();
}
function renderTripList(){
  const el=document.getElementById('trip-list');
  if(!_trips.length){el.innerHTML='<div class="empty"><div class="ei2">🗺</div><p>旅行がありません<br>＋追加ボタンから登録してください</p></div>';return;}
  el.innerHTML=_trips.map(t=>{
    const tot=_entries.filter(e=>e.trip===t.name).reduce((s,e)=>s+e.amount,0);
    const esc=t.name.replace(/'/g,"\\'");
    return`<div class="tc${_curTrip===t.name?' active':''}">
      <div onclick="setActiveTrip('${esc}')" style="cursor:pointer;padding-right:3rem">
        <div class="tc-name">${t.name}</div>
        <div class="tc-date">${t.start}${t.end?' 〜 '+t.end:''} ${t.memo?'・'+t.memo:''}</div>
      </div>
      <div class="tc-tot">¥${fmt(tot)}</div>
      <button onclick="openTripEdit('${esc}')" style="position:absolute;right:.9rem;bottom:.5rem;background:none;border:none;font-size:.72rem;color:var(--muted);cursor:pointer;padding:.1rem .4rem">✏ 編集</button>
    </div>`;
  }).join('');
}
function setActiveTrip(name){
  _curTrip=name;
  document.getElementById('hdr-trip-sel').value=name;
  renderTripList();renderSummary();renderHistory();
  showToast('「'+name+'」を選択');
}
function openTripModal(){
  document.getElementById('trip-mo-title').textContent='旅行を追加';
  document.getElementById('tm-edit-id').value='';
  ['tm-name','tm-memo'].forEach(id=>document.getElementById(id).value='');
  const d=jstDate();
  document.getElementById('tm-start').value=d;
  document.getElementById('tm-end').value=d;
  document.getElementById('trip-mo').classList.remove('hidden');
}
function openTripEdit(name){
  const t=_trips.find(t=>t.name===name);
  if(!t)return;
  document.getElementById('trip-mo-title').textContent='旅行を編集';
  document.getElementById('tm-edit-id').value=t.id;
  document.getElementById('tm-name').value=t.name;
  document.getElementById('tm-start').value=t.start;
  document.getElementById('tm-end').value=t.end;
  document.getElementById('tm-memo').value=t.memo||'';
  document.getElementById('trip-mo').classList.remove('hidden');
}
function closeTripMo(e){if(!e||e.target.id==='trip-mo')document.getElementById('trip-mo').classList.add('hidden');}
function saveTrip(){
  const name=document.getElementById('tm-name').value.trim();
  const start=document.getElementById('tm-start').value;
  const end=document.getElementById('tm-end').value;
  const memo=document.getElementById('tm-memo').value.trim();
  const editId=document.getElementById('tm-edit-id').value;
  if(!name){showToast('旅行名を入力してください');return;}
  if(editId){
    const idx=_trips.findIndex(t=>t.id===editId);
    const oldName=idx>=0?_trips[idx].name:'';
    if(idx>=0) _trips[idx]={id:editId,name,start,end,memo};
    if(oldName && oldName!==name){
      // 支出明細の旅行名を更新
      _entries.forEach(e=>{if(e.trip===oldName)e.trip=name;});
      // 按分データのキーを更新
      if(_allocs[oldName]!==undefined){_allocs[name]=_allocs[oldName];delete _allocs[oldName];}
      if(_curTrip===oldName) _curTrip=name;
      // GAS dataシートの旅行名列も一括更新
      gasPost({action:'rename_trip',oldName,newName:name});
      gasPost({action:'save_allocs',rows:[['旅行名','大','洋子','公費'],...Object.entries(_allocs).map(([n,v])=>[n,v['大'],v['洋子'],v['公費']])]});
      showToast('✓ 旅行名と関連データを更新しました','success');
    } else {
      showToast('✓ 旅行を更新しました','success');
    }
  } else {
    _trips.push({id:String(Date.now()),name,start,end,memo});
    showToast('✓ 旅行を追加しました','success');
  }
  gasPost({action:'save_trips',rows:[['ID','旅行名','開始日','終了日','メモ'],..._trips.map(t=>[t.id,t.name,t.start,t.end,t.memo])]});
  renderTripSels();renderTripList();closeTripMo();
}

function initForm(){
  document.getElementById('cat-grid').innerHTML=CATS.map(c=>`<button class="cb" onclick="selCat('${c.key}',this)"><span class="ci">${c.icon}</span><span>${c.label}</span></button>`).join('');
  document.getElementById('e-date').value=jstDate();
}
function selCat(key,btn){
  _selCat=key;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const cat=CATS.find(c=>c.key===key);
  document.getElementById('e-subcat').value='';
  document.getElementById('subcat-row').style.display='block';
  renderSubChips(key,cat.subs);
}
function renderSubChips(key,defs){
  const chips=getChips(key,defs);
  document.getElementById('subcat-chips').innerHTML=
    chips.map((c,i)=>
      `<span class="chip" onclick="setSubcat(this,'${c.replace(/'/g,"\\'")}')"> ${c}<button class="chip-del" onclick="event.stopPropagation();removeChipInline('${key}',${i},true)" title="削除">×</button></span>`
    ).join('')+
    `<button class="chip-e" onclick="addChipInline('${key}','${(CATS.find(c=>c.key===key)?.label||key).replace(/'/g,"\\'")}',true)">＋追加</button>`;
}
function renderPayChips(key,val){
  const uc=getChips(key,PAY_CHIPS[val]||[]);
  document.getElementById('pay-chips').innerHTML=
    uc.map((c,i)=>
      `<span class="chip" onclick="setPayDetail(this,'${c.replace(/'/g,"\\'")}')"> ${c}<button class="chip-del" onclick="event.stopPropagation();removeChipInline('${key}',${i},false)" title="削除">×</button></span>`
    ).join('')+
    `<button class="chip-e" onclick="addChipInline('${key}','${val}の詳細',false)">＋追加</button>`;
}
function setSubcat(btn,val){
  document.getElementById('e-subcat').value=val;
  document.querySelectorAll('#subcat-chips .chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');
}
function setPayer(val,btn){
  _selPayer=val;
  document.querySelectorAll('#payer-pills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
}
function setPayMethod(val,btn){
  _selPay=val;
  document.querySelectorAll('#pay-pills .pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const inp=document.getElementById('e-paydetail');
  if(val==='現金'){document.getElementById('pay-chips').innerHTML='';inp.style.display='none';inp.value='現金';}
  else{renderPayChips('pay_'+val,val);inp.style.display='block';inp.value='';}
}
function setPayDetail(btn,val){
  document.getElementById('e-paydetail').value=val;
  document.querySelectorAll('#pay-chips .chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');
}
let _submitting = false;
function submitEntry(){
  if(_submitting) return;
  const trip=_curTrip;
  const date=document.getElementById('e-date').value;
  const subcat=document.getElementById('e-subcat').value.trim();
  const amount=parseFloat(document.getElementById('e-amount').value);
  const memo=document.getElementById('e-memo').value.trim();
  const pd=document.getElementById('e-paydetail').value.trim();
  if(!trip){showToast('旅行を選んでください');return;}
  if(!date){showToast('日付を入力してください');return;}
  if(!_selCat){showToast('カテゴリを選んでください');return;}
  if(!_selPayer){showToast('支払者を選んでください');return;}
  if(!_selPay){showToast('決済方法を選んでください');return;}
  if(!amount||amount<=0){showToast('金額を入力してください');return;}
  _submitting = true;
  const btn = document.querySelector('.sbtn');
  if(btn){btn.disabled=true;btn.textContent='送信中…';}
  const cat=CATS.find(c=>c.key===_selCat);
  const id=String(Date.now());
  _entries.unshift({id,trip,date,cat:cat.label,subcat,payer:_selPayer,payMethod:_selPay,payDetail:pd||_selPay,amount,memo});
  gasPost({action:'append',row:[id,trip,date,cat.label,subcat,_selPayer,_selPay,pd||_selPay,amount,memo]}).then(()=>{
    document.getElementById('e-amount').value='';
    document.getElementById('e-memo').value='';
    document.getElementById('e-subcat').value='';
    document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));
    document.getElementById('subcat-row').style.display='none';
    _selCat='';
    showToast('✓ '+cat.label+' を記録しました','success');
    renderSummary();renderHistory();
  }).finally(()=>{
    _submitting = false;
    if(btn){btn.disabled=false;btn.textContent='✈ 記録する';}
  });
}

function tripEs(){return _curTrip?_entries.filter(e=>e.trip===_curTrip):[];}
function renderSummary(){
  if(!_curTrip){
    document.getElementById('sum-no-trip').style.display='block';
    document.getElementById('sum-content').style.display='none';return;
  }
  document.getElementById('sum-no-trip').style.display='none';
  document.getElementById('sum-content').style.display='block';
  const es=tripEs();
  const total=es.reduce((s,e)=>s+e.amount,0);
  const P=['大','洋子','公費'];
  const byP={大:0,洋子:0,公費:0};
  es.forEach(e=>{if(byP[e.payer]!==undefined)byP[e.payer]+=e.amount;});
  const fmtv=(n)=>n<0?`<span class="sv neg">-¥${fmt(-n)}</span>`:`<span class="sv">¥${fmt(n)}</span>`;
  document.getElementById('sum-cards').innerHTML=`
    <div class="sc full"><div class="sl">総支出（${_curTrip}）</div>${fmtv(total)}<div class="ss">${es.length}件</div></div>
    <div class="sc"><div class="sl">大</div>${fmtv(byP['大'])}</div>
    <div class="sc"><div class="sl">洋子</div>${fmtv(byP['洋子'])}</div>
    <div class="sc"><div class="sl">公費</div>${fmtv(byP['公費'])}</div>
    <div class="sc"><div class="sl">大＋洋子</div>${fmtv(byP['大']+byP['洋子'])}</div>`;
  const catP={};CATS.forEach(c=>{catP[c.label]={大:0,洋子:0,公費:0};});
  es.forEach(e=>{if(!catP[e.cat])catP[e.cat]={大:0,洋子:0,公費:0};if(catP[e.cat][e.payer]!==undefined)catP[e.cat][e.payer]+=e.amount;});
  const totP={大:0,洋子:0,公費:0};let pbHtml='';
  Object.entries(catP).forEach(([cat,v])=>{
    const tot=v['大']+v['洋子']+v['公費'];if(!tot)return;
    P.forEach(p=>totP[p]+=v[p]);
    pbHtml+=`<tr><td class="tl">${cat}</td>${P.map(p=>`<td class="${'tr'+(v[p]<0?' neg':'')}">${v[p]?'¥'+fmt(v[p]):'—'}</td>`).join('')}<td class="${'tr'+(tot<0?' neg':'')}">¥${fmt(tot)}</td></tr>`;
  });
  const gt=totP['大']+totP['洋子']+totP['公費'];
  pbHtml+=`<tr class="tot-row"><td class="tl">合計</td>${P.map(p=>`<td class="${'tr'+(totP[p]<0?' neg':'')}">¥${fmt(totP[p])}</td>`).join('')}<td class="${'tr'+(gt<0?' neg':'')}">¥${fmt(gt)}</td></tr>`;
  document.getElementById('payer-body').innerHTML=pbHtml;
  const catM={};es.forEach(e=>{if(!catM[e.cat])catM[e.cat]={amt:0,cnt:0};catM[e.cat].amt+=e.amount;catM[e.cat].cnt++;});
  document.getElementById('cat-body').innerHTML=Object.entries(catM).sort((a,b)=>b[1].amt-a[1].amt).map(([cat,v])=>{
    const pct=total?Math.round(v.amt/total*100):0;
    return`<tr><td class="tl">${cat}</td><td class="tr">¥${fmt(v.amt)}</td><td>${v.cnt}件</td><td>${pct}%</td></tr>`;
  }).join('');
  const a=_allocs[_curTrip]||{};
  document.getElementById('alloc-dai').value=a['大']||'';
  document.getElementById('alloc-yoko').value=a['洋子']||'';
  document.getElementById('alloc-kohi').value=a['公費']||'';
  updateAllocTotal();
}
function updateAllocTotal(){
  const d=parseFloat(document.getElementById('alloc-dai').value)||0;
  const y=parseFloat(document.getElementById('alloc-yoko').value)||0;
  const k=parseFloat(document.getElementById('alloc-kohi').value)||0;
  document.getElementById('alloc-total').textContent='合計: ¥'+fmt(d+y+k);
}
function saveAlloc(){
  if(!_curTrip){showToast('旅行を選んでください');return;}
  const d=parseFloat(document.getElementById('alloc-dai').value)||0;
  const y=parseFloat(document.getElementById('alloc-yoko').value)||0;
  const k=parseFloat(document.getElementById('alloc-kohi').value)||0;
  _allocs[_curTrip]={大:d,洋子:y,公費:k};
  gasPost({action:'save_allocs',rows:[['旅行名','大','洋子','公費'],...Object.entries(_allocs).map(([n,v])=>[n,v['大'],v['洋子'],v['公費']])]});
  showToast('✓ 按分を保存しました','success');
}

function renderHistory(){
  const es=(_curTrip?_entries.filter(e=>e.trip===_curTrip):_entries).sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('hist-list');
  if(!es.length){
    el.innerHTML='<div class="empty"><div class="ei2">📋</div><p>'+(
      _curTrip?'「'+_curTrip+'」の記録がありません':'旅行を選択してください'
    )+'</p></div>';return;
  }
  const g={};es.forEach(e=>{if(!g[e.date])g[e.date]=[];g[e.date].push(e);});
  el.innerHTML=Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,list])=>`
    <div style="border-bottom:1px solid var(--border)">
      <div style="padding:.35rem 0;font-size:.8rem;font-weight:700;color:var(--muted);font-family:var(--font-en)">${date}</div>
      ${list.map(e=>`<div class="ei-row">
        <span class="ebadge">${e.cat}</span>
        <div class="einfo"><div class="emain">${e.subcat||e.cat}${e.memo?' · '+e.memo:''}</div><div class="esub">${e.payer} · ${e.payDetail} · ${e.trip}</div></div>
        <span class="eamt${e.amount<0?' neg':''}">¥${fmt(e.amount)}</span>
        <button class="edel" onclick="delEntry('${e.id}')">✕</button>
      </div>`).join('')}
    </div>`).join('');
}
function delEntry(id){_entries=_entries.filter(e=>e.id!==id);gasPost({action:'delete',id});renderHistory();renderSummary();showToast('削除しました');}

function removeChipInline(key,i,isSub){
  const cat=CATS.find(c=>c.key===key);
  const chips=getChips(key,cat?.subs||[]);
  chips.splice(i,1);setChips(key,chips);
  if(isSub){if(_selCat)renderSubChips(key,cat?.subs||[]);}
  else{if(_selPay)renderPayChips(key,_selPay);}
}
function addChipInline(key,label,isSub){
  const v=prompt(label+' に追加する候補を入力してください');
  if(!v||!v.trim())return;
  const cat=CATS.find(c=>c.key===key);
  const chips=getChips(key,cat?.subs||[]);
  if(!chips.includes(v.trim())){chips.push(v.trim());setChips(key,chips);}
  if(isSub){if(_selCat)renderSubChips(key,cat?.subs||[]);}
  else{if(_selPay)renderPayChips(key,_selPay);}
}

function fmt(n){return Math.round(n).toLocaleString();}
function jstDate(){const d=new Date();return new Date(d.getTime()+9*3600000).toISOString().slice(0,10);}
function getChips(key,defs=[]){const s=localStorage.getItem('tb2_'+key);if(s!==null){try{return JSON.parse(s);}catch{}}return defs;}
function setChips(key,chips){localStorage.setItem('tb2_'+key,JSON.stringify(chips));}

// ── 候補エクスポート ──
function exportTravelPrefs(){
  const keys=[...CATS.map(c=>c.key),'カード','QR'];
  const data={};
  keys.forEach(k=>{const v=localStorage.getItem('tb2_'+k);if(v!==null)data['tb2_'+k]=v;});
  data._exported=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`tabikake_prefs_${jstDate()}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('候補設定をエクスポートしました','success');
}

// ── 候補インポート ──
function importTravelPrefs(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!confirm('現在の候補設定を上書きしますか？\nエクスポート日時: '+(data._exported||'不明')))return;
      Object.entries(data).forEach(([k,v])=>{if(k.startsWith('tb2_'))localStorage.setItem(k,v);});
      if(_selCat){const cat=CATS.find(c=>c.key===_selCat);renderSubChips(_selCat,cat?.subs||[]);}
      showToast('候補設定をインポートしました','success');
    }catch{showToast('読み込みに失敗しました','error');}
    input.value='';
  };
  reader.readAsText(file);
}

// ── スプレッドシート出力（CSV一括） ──
function exportSSData(){
  if(!_entries.length){showToast('データがありません','error');return;}
  const BOM='﻿';
  const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  // dataシート
  const dataRows=[['ID','旅行名','日付','カテゴリ','サブカテゴリ','支払者','決済種別','決済詳細','金額','メモ']];
  [..._entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    dataRows.push([e.id,e.trip,e.date,e.cat,e.subcat,e.payer,e.payMethod,e.payDetail,e.amount,e.memo]);
  });
  const dataCsv=BOM+dataRows.map(r=>r.map(esc).join(',')).join('\n');
  dl(dataCsv,`tabikake_data_${jstDate()}.csv`);

  // tripsシート
  const tripRows=[['ID','旅行名','開始日','終了日','メモ'],..._trips.map(t=>[t.id,t.name,t.start,t.end,t.memo])];
  const tripCsv=BOM+tripRows.map(r=>r.map(esc).join(',')).join('\n');
  dl(tripCsv,`tabikake_trips_${jstDate()}.csv`);

  showToast('CSVを2ファイルエクスポートしました','success');
}
function dl(csv,fname){
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;a.click();
  URL.revokeObjectURL(url);
}
function goPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  btn.classList.add('on');
  // どのページに移動しても常に最新状態を表示
  renderSummary();
  renderHistory();
  if(id==='trips') renderTripList();
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast';
  if(type==='success')t.classList.add('success');
  t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

initForm();
loadAllFromGAS(true);
</script>
